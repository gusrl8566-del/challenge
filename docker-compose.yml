services:
  postgres:
    image: postgres:15-alpine
    container_name: inbody-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inbody-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_TYPE: ${DB_TYPE:-postgres}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_SUPER_CODE: ${ADMIN_SUPER_CODE}
      PORT: 3001
      UPLOAD_DIR: /uploads
      FRONTEND_URL: ${FRONTEND_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_OCR_MODEL: ${OPENAI_OCR_MODEL:-gpt-4.1}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "3001:3001"
    volumes:
      - upload_data:/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inbody-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3001/api}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  upload_data:
