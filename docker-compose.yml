version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: inbody-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: inbody
      POSTGRES_PASSWORD: inbody_secret
      POSTGRES_DB: inbody_challenge
    volumes:
      - /volume1/docker/inbody/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inbody"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inbody-backend
    restart: unless-stopped
    environment:
      DB_TYPE: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: inbody
      DATABASE_PASSWORD: inbody_secret
      DATABASE_NAME: inbody_challenge
      JWT_SECRET: your-secret-key-change-in-production
      UPLOAD_DIR: /uploads
      FRONTEND_URL: http://inbody.your-domain.com
    ports:
      - "3001:3001"
    volumes:
      - /volume1/docker/inbody/uploads:/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inbody-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
